---
# tasks file for nkg.proxmox.repos
#
# Manages the Proxmox VE APT repositories (enterprise / no-subscription / Ceph)
# in the modern deb822 `.sources` format, signed with the Proxmox release key,
# and removes the web UI subscription nag.
#
# deb822_repository replaces the deprecated apt_repository (removed in
# ansible-core 2.25) and does not depend on the removed apt-key/gpg tooling.

# A stock Proxmox install enables the enterprise pve (and ceph) repos, which
# return 401 without a subscription and break `apt update`. Disable them BEFORE
# any apt call — using the file module so this needs neither apt nor
# python3-debian. Only done when the repo is not wanted (the default), so it
# stays idempotent when enterprise/ceph are explicitly enabled.
- name: Disable the stock Proxmox enterprise repository
  ansible.builtin.file:
    path: "/etc/apt/sources.list.d/{{ item }}"
    state: absent
  loop:
    - pve-enterprise.sources
    - pve-enterprise.list
  when: not repos_use_enterprise
  notify: Update apt cache
  tags: [repos, enterprise]

- name: Disable the stock Proxmox Ceph enterprise repository
  ansible.builtin.file:
    path: "/etc/apt/sources.list.d/{{ item }}"
    state: absent
  loop:
    - ceph.sources
    - ceph.list
  when: not repos_ceph_enabled
  notify: Update apt cache
  tags: [repos, ceph]

- name: Install python3-debian (required by deb822_repository)
  ansible.builtin.apt:
    name: python3-debian
    state: present
    update_cache: true
  tags: [repos]

# The signing key is only needed when at least one Proxmox repo is enabled.
- name: Ensure the APT keyring directory exists
  ansible.builtin.file:
    path: "{{ repos_proxmox_keyring_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: repos_use_enterprise or repos_no_subscription or repos_ceph_enabled
  tags: [repos]

- name: Install the Proxmox release signing key
  ansible.builtin.get_url:
    url: "{{ repos_proxmox_key_url }}"
    dest: "{{ repos_proxmox_keyring_path }}"
    owner: root
    group: root
    mode: "0644"
  when: repos_use_enterprise or repos_no_subscription or repos_ceph_enabled
  tags: [repos]

- name: Configure the Proxmox VE enterprise repository
  ansible.builtin.deb822_repository:
    name: pve-enterprise
    types: [deb]
    uris: https://enterprise.proxmox.com/debian/pve
    suites: ["{{ repos_debian_suite }}"]
    components: [pve-enterprise]
    signed_by: "{{ repos_proxmox_keyring_path }}"
    enabled: "{{ repos_use_enterprise }}"
    state: "{{ 'present' if repos_use_enterprise else 'absent' }}"
  notify: Update apt cache
  tags: [repos, enterprise]

- name: Configure the Proxmox VE no-subscription repository
  ansible.builtin.deb822_repository:
    name: pve-no-subscription
    types: [deb]
    uris: http://download.proxmox.com/debian/pve
    suites: ["{{ repos_debian_suite }}"]
    components: [pve-no-subscription]
    signed_by: "{{ repos_proxmox_keyring_path }}"
    enabled: "{{ repos_no_subscription }}"
    state: "{{ 'present' if repos_no_subscription else 'absent' }}"
  notify: Update apt cache
  tags: [repos, no-subscription]

- name: Configure the Ceph no-subscription repository
  ansible.builtin.deb822_repository:
    name: ceph
    types: [deb]
    uris: "http://download.proxmox.com/debian/ceph-{{ repos_ceph_release }}"
    suites: ["{{ repos_debian_suite }}"]
    components: [no-subscription]
    signed_by: "{{ repos_proxmox_keyring_path }}"
    enabled: "{{ repos_ceph_enabled }}"
    state: "{{ 'present' if repos_ceph_enabled else 'absent' }}"
  notify: Update apt cache
  tags: [repos, ceph]

- name: Remove the web UI subscription nag
  ansible.builtin.include_tasks: subscription_nag.yml
  when: repos_remove_subscription_nag | bool
  tags: [repos, nag]

# The apt cache is refreshed by the "Update apt cache" handler, notified above
# only when a repo actually changed — so steady-state re-runs stay idempotent.
- name: Flush handlers so the cache refresh happens before the role returns
  ansible.builtin.meta: flush_handlers
  tags: [repos]
