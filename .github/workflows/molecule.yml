---
name: Molecule

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  molecule:
    # api_access, security and hetzner_image need a real Proxmox host / QEMU /
    # the konstruktoid role applied, so they are tested out of band.
    uses: nkg/github-actions/.github/workflows/molecule.yml@v2
    with:
      roles: |
        crowdsec
        host_base
        host_config
        repos
      roles-dir: roles
      requirements-file: requirements.yml
