---
ancestor: null
releases:
  1.0.2:
    release_date: "2026-06-16"
    changes:
      bugfixes:
        - repos — refresh the apt cache via a handler notified on repo change, instead of an always-changed update_cache task (idempotent re-runs).
        - security — exclude rsync/rpcbind/git from konstruktoid's packages_blocklist; proxmox-ve depends on rsync and rpcbind, so removing them cascades into uninstalling Proxmox.
        - requirements/galaxy — declare community.crypto (a konstruktoid.hardening dependency Ansible resolves at parse time), so the security role works on a fresh install.
        - repos — disable the stock enterprise pve/ceph repos before any apt call, so a no-subscription host's 401 no longer breaks apt update.
        - host_config — put /usr/sbin on PATH for the apparmor_parser unload so it resolves under a non-login su.
        - api_access — accept the SSH key as a file path (api_access_*_ssh_key_file) and trim it; full-path visudo and no apt-update in bootstrap.
      minor_changes:
        - api_access — bootstrap (Linux IaC user) split into bootstrap.yml (--tags bootstrap); added a container molecule scenario, now in CI.
        - playbooks — site.yml and the new api_access.yml put /usr/sbin on PATH play-wide (Proxmox CLI + konstruktoid under su).
  1.0.1:
    release_date: "2026-06-16"
    changes:
      minor_changes:
        - security — disable konstruktoid USBGuard by default (manage_usbguard=false); it blocks USB on a hypervisor and breaks console/passthrough.
        - security — re-assert Proxmox-required sysctls after hardening (security_sysctl_overrides), re-enabling unprivileged user namespaces so unprivileged LXC keeps working.
  1.0.0:
    release_date: "2026-06-16"
    changes:
      release_summary: >-
        Initial release. Roles to provision, configure, secure and harden
        Proxmox VE: repos, host_base, host_config, security (konstruktoid
        wrapper), crowdsec, api_access, and hetzner_image (bare-metal install).
